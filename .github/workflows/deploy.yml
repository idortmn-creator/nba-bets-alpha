name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build (Frontend)
        run: |
          npm install
          npm run build

      - name: Install and Build (Functions)
        run: |
          npm --prefix functions install
          npm --prefix functions run build

      - name: Deploy Hosting + Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,firestore:rules --project nba-bets-2026
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Inject functions env
        run: echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" > functions/.env

      - name: Deploy Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --force --project nba-bets-2026
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
